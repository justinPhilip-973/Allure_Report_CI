name: Java CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: 4. Execute Reporting Tests
        if: always()
        continue-on-error: true
        run: |
          gradle clean runAllureReportTestsFor_CI

      - name: 5. Copy Allure Metadata
        if: always()
        run: |
          mkdir -p build/allure-results

          cp src/test/resources/allure/categories.json \
             build/allure-results/categories.json

          cp src/test/resources/allure/environment.properties \
             build/allure-results/environment.properties

      - name: 6. Checkout GH Pages History
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: justin-gh-pages
          path: justin-gh-pages

      - name: 7. Verify Allure Inputs
        if: always()
        run: |
          echo "===== build/allure-results ====="
          ls -la build/allure-results

          echo ""
          echo "===== categories.json ====="
          cat build/allure-results/categories.json

          echo ""
          echo "===== environment.properties ====="
          cat build/allure-results/environment.properties

      - name: 8. Generate Allure Report
        if: always()
        continue-on-error: true
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: allure-report
          gh_pages: justin-gh-pages
          allure_history: allure-history

      - name: 9. Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: 10. Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_branch: justin-gh-pages
          publish_dir: allure-history
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: 11. Print Report URL
        if: always()
        run: |
          echo "Allure Report URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"