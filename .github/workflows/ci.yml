name: Java CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Run CI Test Suites
        if: always()
        continue-on-error: true
        run: |
          gradle clean runAllureReportTestsFor_CI

      - name: Checkout justin-gh-pages Branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: justin-gh-pages
          path: justin-gh-pages

      - name: Verify Allure Results
        if: always()
        run: |
          echo "Looking for allure-results folders..."
          find . -type d -name allure-results

          echo "Listing first few result files..."
          find build/allure-results -type f | head -20 || true

      - name: Generate Allure Report
        if: always()
        continue-on-error: true
        uses: simple-elf/allure-report-action@master
        with:
          allure-results: build/allure-results
          allure-report: allure-report
          gh_pages: justin-gh-pages
          allure-history: allure-history

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_branch: justin-gh-pages
          publish_dir: allure-history
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display Report URL
        if: always()
        run: |
          echo "Allure Report Published"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"