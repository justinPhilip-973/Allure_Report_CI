name: Java CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]


jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setting up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      # Installs Gradle 8.10.2 on the runner and puts `gradle` on PATH,
      # so the build does NOT need the committed gradle-wrapper.jar.
      # (Zscaler blocks committing/uploading .jar files, so the wrapper
      #  jar is missing from the repo; using an installed Gradle avoids it.)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      # Runs compile for the whole project, but only the Testcontainers +
      # plain unit tests (org.testcontainers.sdet.*). The Selenium/Cucumber UI
      # tests (org.selenium.sdet.*) need a running web app + browser, so they
      # are excluded from CI. Run the full suite locally with `gradle test`.
      - name: Running Order tests using Gradle
        if: always()
        continue-on-error: true
        run: gradle clean runAllureReportTestsFor_CI

      - name: Checkout justin-gh-pages branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          ref: justin-gh-pages
          path: justin-gh-pages

      - name: Check Allure Result exists
        if: always()
        run: |
          find . -type d -name allure-results

      - name: Generate Allure Report
        if: always()
        continue-on-error: true
        uses: simple-elf/allure-report-action@master
        with:
          allure-results: build/allure-results
          allure-report: allure-report
          gh_pages: justin-gh-pages
          allure-history: allure-history

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          branch: justin-gh-pages
          folder: allure-history
          token: ${{ secrets.GITHUB_TOKEN }}

