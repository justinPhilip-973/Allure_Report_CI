name: Order Repository CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  order-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: orders_db
          MYSQL_ROOT_PASSWORD: justinworkmysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pjustinworkmysql"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission for gradlew
        run: chmod +x gradlew

      - name: Run Order Test Suite
        run: ./gradlew testContainerCITests --info
        env:
          JAVA_TOOL_OPTIONS: >
            -DDB_JDBC_URL=jdbc:mysql://localhost:3306/orders_db
            -DDB_USER=root
            -DDB_PASSWORD=justinworkmysql